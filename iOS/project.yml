name: Donationlog
options:
  bundleIdPrefix: com.shimondeitel.donationlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Donationlog:
    type: application
    platform: iOS
    sources:
      - path: Donationlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.donationlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Donationlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DonationlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DonationlogTests
      - path: Donationlog.storekit
    dependencies:
      - target: Donationlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.donationlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DonationlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DonationlogUITests
    dependencies:
      - target: Donationlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.donationlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Donationlog:
    build:
      targets:
        Donationlog: all
        DonationlogTests: [test]
        DonationlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Donationlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Donationlog.storekit
      targets:
        - DonationlogTests
        - DonationlogUITests
    archive:
      config: Release
